---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name blocky-secret
  namespace: media
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    creationPolicy: Owner
    template:
      data:
        PGCONNECT_TIMEOUT: 10
        PGHOST: &dbhost postgres-rw.default.svc.cluster.local
        PGPORT: &dbport 5432
        PGUSER: &dbuser "{{ .BLOCKY_POSTGRES_USER }}"
        PGPASSWORD: &dbpass "{{ .BLOCKY_POSTGRES_PASS }}"
        PGDATABASE: &db blocky
        INIT_POSTGRES_DBNAME: *db
        INIT_POSTGRES_HOST: *dbhost
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
      templateFrom:
        - configMap:
            name: blocky-config
            items:
              - key: config.yml
  dataFrom:
    - extract:
        key: blocky
    - extract:
        key: cloudnativepg