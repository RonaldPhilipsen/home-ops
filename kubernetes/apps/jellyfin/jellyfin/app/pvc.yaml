---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-nfs
  namespace: jellyfin
  annotations:
    helm.sh/resource-policy: keep
spec:
  storageClassName: jellyfin-nfs
  capacity:
    storage: 15Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: jellyfin
    name: jellyfin-nfs
  nfs:
    server: 172.16.20.7
    path: /Media
  mountOptions:
    - nfsvers=4.2
    - nconnect=8
    - noatime
    - hard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-nfs
  namespace: jellyfin
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: jellyfin-nfs
  resources:
    requests:
      storage: 15Ti
