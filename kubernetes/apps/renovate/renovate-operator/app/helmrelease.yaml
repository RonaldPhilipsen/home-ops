---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app renovate-operator
  annotations:
    reloader.stakater.com/auto: "true"
    secret.reloader.stakater.com/reload: "renovate-s3"
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    fullnameOverride: *app
    rbac:
      ownNamespaceOnly: true
    webhook:
      enabled: true
      authentication:
        enabled: true
        secretRef:
          name: renovate-webhook
          key: WEBHOOK_TOKEN
    telemetry:
      enabled: true
      endpoint: "https://gateway-collector.observability.cluster.local:4317"
      forwardToJobs: true
      jobEndpoint: "https://gateway-collector.observability.cluster.local:4318"
