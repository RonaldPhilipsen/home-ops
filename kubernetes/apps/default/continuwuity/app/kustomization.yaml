---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./externalsecret.yaml
configMapGenerator:
  - name: conduit-configmap
    files:
      - resources/conduit.toml
generatorOptions:
  disableNameSuffixHash: true
configurations:
  - ./resources/kustomizeconfig.yaml
