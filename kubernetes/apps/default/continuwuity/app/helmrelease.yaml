---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v4.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app continuwuity
  namespace: default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: continuwuity
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      continuwuity:
        containers:
          app:
            image:
              repository: forgejo.ellis.link/continuwuation/continuwuity
              tag: v0.5.6-maxperf@sha256:cfc4417a7ace9ad683e21926f3f9eaf056102b1d19c59b489df52e656d423dcf
            env:
              TZ: "Europe/Amsterdam"
              CONDUWUIT_SERVER_NAME: rphilipsen.nl
              CONDUWUIT_ADDRESS:
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: status.podIP
              CONDUWUIT_PORT: &port 8080
              CONDUWUIT_DATABASE_PATH: /data
              CONDUWUIT_NEW_USER_DISPLAYNAME_SUFFIX: ""
              CONDUWUIT_WELL_KNOWN__CLIENT: "https://matrix.rphilipsen.nl"
              CONDUWUIT_WELL_KNOWN__SERVER: "matrix.rphilipsen.nl:443"
              CONDUWUIT_ALLOW_ENCRYPTION: true
              CONDUWUIT_ALLOW_FEDERATION: true
              CONDUWUIT_ALLOW_REGISTRATION: true
              CONDUWUIT_SUSPEND_ON_REGISTER: true
              CONDUWUIT_FORGET_FORCED_UPON_LEAVE: true
              CONDUWUIT_REQUIRE_AUTH_FOR_PROFILE_REQUESTS: true
              CONDUWUIT_ALLOW_PUBLIC_ROOM_DIRECTORY_WITHOUT_AUTH: false
              CONDUWUIT_ALLOW_PUBLIC_ROOM_DIRECTORY_OVER_FEDERATION: false
              CONDUWUIT_LOCKDOWN_PUBLIC_ROOM_DIRECTORY: true
              CONDUWUIT_ALLOW_LEGACY_MEDIA: false
              CONDUWUIT_QUERY_OVER_TCP_ONLY: true
              CONDUWUIT_IP_LOOKUP_STRATEGY: "1"
            envFrom:
              - secretRef:
                  name: continuwuity-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: continuwuity
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/external: "true"
        parentRefs:
          - name: external-agentgateway
            namespace: network
            sectionName: https
        hostnames:
          - &host matrix.rphilipsen.nl
      well-known:
        annotations:
          external-dns.alpha.kubernetes.io/external: "true"
        parentRefs:
          - name: external-agentgateway
            namespace: network
            sectionName: https
        hostnames:
          - rphilipsen.nl
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /.well-known/matrix/
            backendRefs:
              - name: continuwuity
                port: *port

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: *app
      media:
        size: 5Gi
        accessMode: ReadWriteOnce
        storageClass: nfs-provision
        suffix: "media"
        retain: true
        globalMounts:
          - path: /data/media
      backups:
        size: 5Gi
        accessMode: ReadWriteOnce
        storageClass: nfs-provision
        suffix: "backups"
        globalMounts:
          - path: /backups
      config:
        type: configMap
        name: conduit-configmap
        globalMounts:
          - path: /config/conduit.toml
            subPath: conduit.toml