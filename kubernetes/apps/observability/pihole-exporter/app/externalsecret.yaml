---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name pihole-exporter
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        PIHOLE_HOSTNAME: "http://pihole.rphilipsen.nl"
        PIHOLE_PASSWORD: "{{ .PIHOLE_PASSWORD }}"
        PIHOLE_API_VERSION: "6"
  dataFrom:
    - extract:
        key: pihole
