---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gaggiuino-exporter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: gaggiuino-exporter
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      gaggiuino-exporter:
        containers:
          app:
            image:
              repository: ghcr.io/ronaldphilipsen/gaggiuino-exporter
              tag: v1.1.3
            env:
              GAGGIUINO_BASE_URL: http://172.16.10.32:80
              OTLP_ENABLED: "true"
              OTLP_ENDPOINT: "http://vmsingle-vmetrics.observability.svc.cluster.local:8428/opentelemetry/v1/metrics"
              OTLP_INTERVAL: "1s"
              OTLP_TIMEOUT: "0.5s"

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 15m
              limits:
                memory: 120M
    service:
      app:
        controller: *app
        ports:
          http:
            port: 9995
    # serviceMonitor:
    #   app:
    #     serviceName: *app
