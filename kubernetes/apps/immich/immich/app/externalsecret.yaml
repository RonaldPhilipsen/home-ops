---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name immich-config
spec:
  target:
    name: *name
    template:
      templateFrom:
        - target: Data
          configMap:
            name: immich-config-tpl
            items:
              - key: configuration.yaml
                templateAs: Values
  dataFrom:
    - extract:
        key: immich
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: onepassword-connect
    - extract:
        key: authelia
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: onepassword-connect
---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name immich-db-config
spec:
  target:
    name: *name
    template:
      data:
        DB_HOSTNAME: immich-postgres-rw
        DB_USERNAME: "{{ .POSTGRES_USER }}"
        DB_DATABASE_NAME: "{{ .POSTGRES_DB }}"
        DB_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
  dataFrom:
    - extract:
        key: immich
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: onepassword-connect
