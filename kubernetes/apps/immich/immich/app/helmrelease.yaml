---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich

spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.7.5
            envFrom:
              - secretRef:
                  name: immich-db-config
            securityContext:
              runAsNonRoot: true
              runAsUser: 2000
              runAsGroup: 2000
              seccompProfile: { type: RuntimeDefault }
              privileged: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
    valkey:
      enabled: true

    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: photos-nfs
      configurationKind: Secret
      existingConfiguration: immich-config
    machine-learning:
      controllers:
        main:
          containers:
            main:
              securityContext:
                runAsNonRoot: true
                runAsUser: 2000
                runAsGroup: 2000
                seccompProfile: { type: RuntimeDefault }
                privileged: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
