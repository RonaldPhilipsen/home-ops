---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich

spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: immich
  values:
    valkey:
      enabled: true

    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: photos-nfs
      configurationKind: Secret
      existingConfiguration: immich-config


    route:
      app:
        hostnames: ["photos.rphilipsen.nl"]
        parentRefs:
          - name: agentgateway-external
            namespace: network
        rules:
          - backendRefs:
              - name: immich-server
                port: 2283

