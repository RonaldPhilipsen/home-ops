machine:
  # handled separately in machine-sysctls.yaml
  # sysctls:
  #   vm.nr_hugepages: "8192"
  nodeLabels:
    openebs.io/engine: mayastor
  kubelet:
    extraMounts:
      - destination: /var/openebs/local
        type: bind
        source: /var/openebs/local
        options:
          - rbind
          - rshared
          - rw
